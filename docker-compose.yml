services:
  postgres:
    image: postgres:17-alpine
    container_name: arkaic-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: arkaic
      POSTGRES_PASSWORD: arkaic
      POSTGRES_DB: arkaic
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arkaic -d arkaic"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: arkaic-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: arkaic-adminer
    ports:
      - "8080:8080"
    restart: unless-stopped

